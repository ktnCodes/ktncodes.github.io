baseURL = "https://ktncodes.github.io/"
languageCode = "en-us"
title = "ktnCodes"
theme = "PaperMod"
paginate = 10

[params]
  author = "Kevin Nguyen"
  description = "Engineering notebook — agentic engineering, embedded systems, and software development"
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "ktnCodes"
    Content = "Engineering notebook on agentic engineering, embedded systems, and building things."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ktnCodes"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/itskevtrinh/"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]
